name: Verify action package

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Verify published CLI installation
        shell: bash
        run: |
          set -euo pipefail
          CLI_DIR="$RUNNER_TEMP/codecordon-cli"
          CLI_TARBALL="$RUNNER_TEMP/codecordon-0.3.0.tgz"
          curl --fail --silent --show-error --location \
            https://github.com/fj8b85t9g6-blip/codecordon-cli/releases/download/v0.3.0/codecordon-0.3.0.tgz \
            --output "$CLI_TARBALL"
          printf '%s  %s\n' \
            'a8152aac4210c55996d1a4eed2ec06e8cc47b457ddfbf665b32a3d46384f13e2' \
            "$CLI_TARBALL" | sha256sum --check --status
          npm install --prefix "$CLI_DIR" --no-save --ignore-scripts "$CLI_TARBALL"
          test "$(node "$CLI_DIR/node_modules/codecordon/bin/codecordon.js" --version)" = "0.3.0"
